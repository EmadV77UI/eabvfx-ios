<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0a">
    <title>EABVFX - TikTok Quality Bypass</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.light-mode {
            background: #f0f2f5;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* Timer Bar - Shows remaining time */
        .timer-bar {
            background: linear-gradient(135deg, rgba(254,44,85,0.2), rgba(37,244,238,0.2));
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(37,244,238,0.3);
            backdrop-filter: blur(10px);
        }

        .timer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .timer-label {
            font-size: 11px;
            color: #888;
            letter-spacing: 1px;
        }

        .timer-value {
            font-family: monospace;
            font-size: 18px;
            font-weight: bold;
            color: #25F4EE;
            text-shadow: 0 0 10px rgba(37,244,238,0.5);
        }

        .timer-progress {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .timer-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #25F4EE, #FE2C55);
            width: 100%;
            transition: width 1s linear;
        }

        .timer-progress-bar.warning {
            background: #FE2C55;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .card {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 24px;
            margin-bottom: 16px;
            text-align: center;
        }

        body.light-mode .card {
            background: rgba(255, 255, 255, 0.95);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .logo-ring {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring svg {
            width: 40px;
            fill: #25F4EE;
        }

        h1 {
            font-family: 'Segoe UI', 'Rajdhani', sans-serif;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .highlight {
            color: #25F4EE;
        }

        .subtitle {
            color: #888;
            font-size: 11px;
            margin-top: 5px;
        }

        .file-picker-area {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(20px);
            border: 2px dashed rgba(37, 244, 238, 0.3);
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .file-picker-area:hover {
            border-color: #25F4EE;
            background: rgba(37, 244, 238, 0.1);
        }

        .file-picker-area svg {
            width: 48px;
            fill: #25F4EE;
            margin-bottom: 15px;
        }

        .file-info {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 16px;
            padding: 15px;
            margin: 15px 0;
            font-size: 12px;
        }

        .file-info div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .file-info span:first-child {
            color: #888;
        }

        .file-info span:last-child {
            color: #25F4EE;
            font-weight: bold;
        }

        .cyber-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #25F4EE, #20BDBC);
            border: none;
            border-radius: 12px;
            font-family: 'Segoe UI', 'Rajdhani', sans-serif;
            font-weight: 800;
            font-size: 16px;
            letter-spacing: 2px;
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .cyber-btn:active {
            transform: scale(0.98);
        }

        .cyber-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .social-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-tiktok {
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-telegram {
            background: rgba(34, 158, 217, 0.15);
            color: #229ED9;
            border: 1px solid rgba(34, 158, 217, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 10px;
            color: #666;
        }

        /* Login Screen */
        .login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.5s ease;
        }

        .login-card {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            border: 1px solid rgba(37,244,238,0.3);
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            text-align: center;
        }

        .login-card input:focus {
            outline: none;
            border-color: #25F4EE;
        }

        .error-msg {
            color: #FE2C55;
            font-size: 12px;
            margin-top: 10px;
            min-height: 30px;
        }

        .success-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            z-index: 1000;
            animation: fadeInOut 2s ease;
            border: 1px solid #2ecc71;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0,0,0,0.3);
            border-radius: 50%;
            border-top-color: #000;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-card">
            <div class="logo-ring" style="margin-bottom: 20px;">
                <svg viewBox="0 0 24 24" style="width: 50px; fill: #25F4EE;">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/>
                </svg>
            </div>
            <h2 style="margin-bottom: 20px;">EABVFX <span style="color:#25F4EE;">BOOSTER</span></h2>
            <input type="text" id="licenseKey" placeholder="Enter License Key" autocomplete="off">
            <button id="verifyBtn" class="cyber-btn" style="margin-top: 10px;">VERIFY</button>

            <div style="margin-top: 20px; font-size: 10px; color: #666;">
                <a href="https://t.me/EabIdbot" target="_blank" style="color: #229ED9;">Get License from @EabIdbot</a>
            </div>

    </div>

    <!-- Main App (Hidden until login) -->
    <div id="mainApp" class="container hidden">
        <!-- Timer Bar -->
        <div class="timer-bar">
            <div class="timer-header">
                <span class="timer-label">⏰ SUBSCRIPTION REMAINING</span>
                <span class="timer-value" id="timerDisplay">Loading...</span>
            </div>
            <div class="timer-progress">
                <div class="timer-progress-bar" id="timerProgress"></div>
            </div>
        </div>

        <!-- Header -->
        <div class="card">
            <div class="logo-ring">
                <svg viewBox="0 0 24 24">
                    <path d="M12 2L2 7l10 5 10-5-10-5zm0 9l2.5-1.25L12 8.5l-2.5 1.25L12 11zm0 2.5l-5-2.5-5 2.5L12 22l10-8.5-5-2.5-5 2.5z"/>
                </svg>
            </div>
            <h1>EABVFX <span class="highlight">BOOSTER</span></h1>
            <div class="subtitle">TikTok Quality Bypass</div>
        </div>

        <!-- File Picker -->
        <div class="file-picker-area" id="filePicker">
            <svg viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <div style="font-weight: 600; margin-top: 10px;">Select Video</div>
            <div style="font-size: 11px; color: #888; margin-top: 5px;">MP4 or MOV</div>
        </div>

        <!-- File Info -->
        <div id="fileInfo" class="file-info" style="display: none;">
            <div><span>📹 Filename:</span><span id="fileName">---</span></div>
            <div><span>📏 Size:</span><span id="fileSize">---</span></div>
            <div><span>🎬 Resolution:</span><span id="fileResolution">---</span></div>
        </div>

        <!-- Bypass Button -->
        <button id="bypassBtn" class="cyber-btn" disabled>
            <span class="btn-text">PROCESS VIDEO</span>
        </button>

        <!-- Logout Button -->
        <button id="logoutBtn" class="cyber-btn" style="background: linear-gradient(90deg, #FE2C55, #d9183d); margin-top: 10px;">
            <span class="btn-text">LOGOUT</span>
        </button>

        <!-- Social Links -->
        <div class="social-actions">
            <a href="https://www.tiktok.com/@eabvfx" class="social-btn btn-tiktok">📱 TikTok</a>
            <a href="https://t.me/KurdishAE" class="social-btn btn-telegram">💬 Telegram</a>
        </div>

        <div class="footer">
            Made by EABVFX | ONLINE
        </div>
    </div>

    <input type="file" id="videoInput" accept="video/mp4,video/quicktime" style="display: none;">

    <script>
        // ============ CONFIGURATION ============
        const WORKER_BASE = 'https://white-brook-5e1f.emadbarzani0011.workers.dev';
        const VERIFY_URL = WORKER_BASE + '/verify';
        const CHECK_URL  = WORKER_BASE + '/check-subscription';

        // ============ SESSION MANAGEMENT ============
        let inactivityTimer = null;
        let subscriptionInterval = null;
        let currentExpiry = null;

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                console.log("Auto-logout: 5 minutes inactivity");
                logout();
            }, 5 * 60 * 1000);
        }

        function logout() {
            localStorage.removeItem('eabvfx_authenticated');
            localStorage.removeItem('eabvfx_expiry');
            localStorage.removeItem('eabvfx_user_id');
            if (subscriptionInterval) clearInterval(subscriptionInterval);
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('mainApp').classList.add('hidden');
            document.getElementById('licenseKey').value = '';
            document.getElementById('loginError').innerHTML = '⏰ Session expired due to inactivity. Please login again.';
        }

        function setupActivityListeners() {
            const events = ['click', 'touchstart', 'touchend', 'scroll', 'keypress'];
            events.forEach(event => {
                document.addEventListener(event, resetInactivityTimer);
            });
            resetInactivityTimer();
        }

        // ============ TIMER DISPLAY ============
        function formatTimeRemaining(ms) {
            if (ms <= 0) return 'EXPIRED';
            const days = Math.floor(ms / (1000 * 60 * 60 * 24));
            const hours = Math.floor((ms % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return `${days}d ${hours}h ${minutes}m`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function updateTimerDisplay() {
            if (!currentExpiry) return;
            const remaining = currentExpiry - Date.now();
            const timerDisplay = document.getElementById('timerDisplay');
            const timerProgress = document.getElementById('timerProgress');
            if (remaining <= 0) {
                timerDisplay.innerHTML = 'EXPIRED';
                timerDisplay.style.color = '#FE2C55';
                timerProgress.style.width = '0%';
                timerProgress.classList.add('warning');
                logout();
                return;
            }
            timerDisplay.innerHTML = formatTimeRemaining(remaining);
            const totalDuration = 30 * 24 * 60 * 60 * 1000;
            const percent = Math.max(0, (remaining / totalDuration) * 100);
            timerProgress.style.width = percent + '%';
            if (remaining < 3 * 24 * 60 * 60 * 1000) {
                timerProgress.classList.add('warning');
                timerDisplay.style.color = '#FE2C55';
            } else {
                timerProgress.classList.remove('warning');
                timerDisplay.style.color = '#25F4EE';
            }
        }

        function startSubscriptionTimer(expiryDate) {
            if (subscriptionInterval) clearInterval(subscriptionInterval);
            currentExpiry = expiryDate;
            updateTimerDisplay();
            subscriptionInterval = setInterval(updateTimerDisplay, 1000);
        }

        // ============ SERVER VERIFICATION ============
        async function verifyLicense(licenseKey) {
            try {
                const response = await fetch(VERIFY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: licenseKey })
                });
                const data = await response.json();
                if (data.success) {
                    // Store user ID from verification
                    const userId = data.user_id;
                    // Fetch subscription details
                    const checkResp = await fetch(`${CHECK_URL}?user=${userId}`);
                    const checkData = await checkResp.json();
                    if (checkData.active && checkData.expires) {
                        const expiry = new Date(checkData.expires).getTime();
                        localStorage.setItem('eabvfx_authenticated', 'true');
                        localStorage.setItem('eabvfx_expiry', expiry);
                        localStorage.setItem('eabvfx_user_id', userId);
                        return { success: true, expiry: expiry };
                    } else {
                        return { success: false, error: 'Subscription expired or not active.' };
                    }
                } else {
                    return { success: false, error: data.error || 'Invalid code.' };
                }
            } catch (err) {
                console.error('Verification error:', err);
                return { success: false, error: 'Network error. Check your internet connection.' };
            }
        }

        async function checkSubscriptionStatus() {
            const userId = localStorage.getItem('eabvfx_user_id');
            if (!userId) return false;
            try {
                const resp = await fetch(`${CHECK_URL}?user=${userId}`);
                const data = await resp.json();
                if (!data.active) {
                    logout();
                    return false;
                }
                // Update expiry from server response
                if (data.expires) {
                    const newExpiry = new Date(data.expires).getTime();
                    if (newExpiry !== currentExpiry) {
                        localStorage.setItem('eabvfx_expiry', newExpiry);
                        startSubscriptionTimer(newExpiry);
                    }
                }
                return true;
            } catch (err) {
                console.error('Subscription check failed:', err);
                // If network error, assume still valid (offline grace)
                return true;
            }
        }

        function startPeriodicCheck() {
            // Check every 30 minutes
            setInterval(checkSubscriptionStatus, 30 * 60 * 1000);
            // Also check when tab gains focus
            window.addEventListener('focus', checkSubscriptionStatus);
        }

        // ============ INITIAL LOAD ============
        async function checkExistingSession() {
            const authenticated = localStorage.getItem('eabvfx_authenticated');
            const expiry = parseInt(localStorage.getItem('eabvfx_expiry'));
            if (authenticated === 'true' && expiry) {
                if (expiry > Date.now()) {
                    return { valid: true, expiry: expiry };
                } else {
                    // Expired
                    logout();
                    return { valid: false };
                }
            }
            return { valid: false };
        }

        // ============ PARTICLE ANIMATION ============
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        let particles = [];
        class Particle {
            constructor(x, y, dirX, dirY, size, color) {
                this.x = x; this.y = y; this.dirX = dirX; this.dirY = dirY;
                this.size = size; this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) this.dirX = -this.dirX;
                if (this.y > canvas.height || this.y < 0) this.dirY = -this.dirY;
                this.x += this.dirX;
                this.y += this.dirY;
                this.draw();
            }
        }
        function initParticles() {
            particles = [];
            let numberOfParticles = Math.min(80, Math.floor((canvas.height * canvas.width) / 10000));
            for (let i = 0; i < numberOfParticles; i++) {
                let size = Math.random() * 2 + 1;
                let x = Math.random() * canvas.width;
                let y = Math.random() * canvas.height;
                let dirX = (Math.random() * 0.6) - 0.3;
                let dirY = (Math.random() * 0.6) - 0.3;
                let color = Math.random() > 0.5 ? 'rgba(37, 244, 238, 0.5)' : 'rgba(254, 44, 85, 0.5)';
                particles.push(new Particle(x, y, dirX, dirY, size, color));
            }
        }
        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let p of particles) p.update();
        }
        initParticles();
        animate();

        // ============ FILE PROCESSING ============
        const filePicker = document.getElementById('filePicker');
        const videoInput = document.getElementById('videoInput');
        const bypassBtn = document.getElementById('bypassBtn');
        const fileInfo = document.getElementById('fileInfo');
        let selectedFile = null;
        filePicker.addEventListener('click', () => videoInput.click());
        videoInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name.length > 30 ? file.name.substring(0, 27) + '...' : file.name;
            const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
            document.getElementById('fileSize').textContent = `${sizeMB} MB`;
            fileInfo.style.display = 'block';
            const video = document.createElement('video');
            video.preload = 'metadata';
            video.onloadedmetadata = function() {
                URL.revokeObjectURL(video.src);
                document.getElementById('fileResolution').textContent = `${video.videoWidth}x${video.videoHeight}`;
                bypassBtn.disabled = false;
            };
            video.src = URL.createObjectURL(file);
            resetInactivityTimer();
        });

        function bypassVideo(file, callback) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const PAYLOAD = 268435457;
                let elstIndex = -1;
                for (let i = 0; i < data.length - 4; i++) {
                    if (data[i] === 0x65 && data[i+1] === 0x6C && 
                        data[i+2] === 0x73 && data[i+3] === 0x74) {
                        elstIndex = i;
                        break;
                    }
                }
                if (elstIndex === -1) {
                    callback({ success: false, error: "No 'elst' atom found" });
                    return;
                }
                const newData = new Uint8Array(data);
                newData[elstIndex + 8] = (PAYLOAD >> 24) & 0xFF;
                newData[elstIndex + 9] = (PAYLOAD >> 16) & 0xFF;
                newData[elstIndex + 10] = (PAYLOAD >> 8) & 0xFF;
                newData[elstIndex + 11] = PAYLOAD & 0xFF;
                const blob = new Blob([newData], { type: 'video/mp4' });
                const originalName = file.name.replace(/\.[^/.]+$/, "");
                callback({ success: true, blob: blob, filename: `${originalName}_eabvfx_bypass.mp4` });
            };
            reader.onerror = () => callback({ success: false, error: "Failed to read file" });
            reader.readAsArrayBuffer(file);
        }

        bypassBtn.addEventListener('click', () => {
            if (!selectedFile) return;
            resetInactivityTimer();
            bypassBtn.disabled = true;
            const originalText = bypassBtn.innerHTML;
            bypassBtn.innerHTML = '<span class="spinner"></span> PROCESSING...';
            bypassVideo(selectedFile, (result) => {
                if (result.success) {
                    const successDiv = document.createElement('div');
                    successDiv.className = 'success-animation';
                    successDiv.innerHTML = `
                        <svg viewBox="0 0 24 24" style="width: 50px; fill: #2ecc71; margin-bottom: 10px;">
                            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                        </svg>
                        <div style="font-weight: 800; color: #2ecc71; font-size: 18px;">SUCCESS!</div>
                        <div style="font-size: 11px; margin-top: 5px;">Video processed</div>
                    `;
                    document.body.appendChild(successDiv);
                    const url = URL.createObjectURL(result.blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = result.filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    setTimeout(() => {
                        successDiv.remove();
                        bypassBtn.innerHTML = originalText;
                        bypassBtn.disabled = false;
                    }, 2000);
                } else {
                    alert('Error: ' + result.error);
                    bypassBtn.innerHTML = originalText;
                    bypassBtn.disabled = false;
                }
            });
        });

        // ============ LOGIN / VERIFY HANDLER ============
        const verifyBtnUI = document.getElementById('verifyBtn');
        const loginScreen = document.getElementById('loginScreen');
        const mainApp = document.getElementById('mainApp');
        const logoutBtn = document.getElementById('logoutBtn');

        verifyBtnUI.addEventListener('click', async () => {
            const license = document.getElementById('licenseKey').value.trim();
            const errorDiv = document.getElementById('loginError');
            if (!license) {
                errorDiv.innerHTML = '❌ Please enter your license key';
                return;
            }
            errorDiv.innerHTML = 'Verifying...';
            const result = await verifyLicense(license);
            if (result.success) {
                errorDiv.innerHTML = '';
                loginScreen.style.display = 'none';
                mainApp.classList.remove('hidden');
                startSubscriptionTimer(result.expiry);
                setupActivityListeners();
                startPeriodicCheck();
            } else {
                errorDiv.innerHTML = '❌ ' + (result.error || 'Invalid license');
                errorDiv.style.color = '#FE2C55';
            }
        });

        logoutBtn.addEventListener('click', () => {
            logout();
        });

        // Check existing session on load
        (async () => {
            const session = await checkExistingSession();
            if (session.valid) {
                loginScreen.style.display = 'none';
                mainApp.classList.remove('hidden');
                startSubscriptionTimer(session.expiry);
                setupActivityListeners();
                // Also verify with server
                const isActive = await checkSubscriptionStatus();
                if (!isActive) {
                    // Already handled by checkSubscriptionStatus (logged out)
                }
                startPeriodicCheck();
            }
        })();

        // Theme toggle (double tap header)
        let tapCount = 0;
        const header = document.querySelector('.card');
        if (header) {
            header.addEventListener('click', () => {
                tapCount++;
                setTimeout(() => { tapCount = 0; }, 500);
                if (tapCount === 2) {
                    document.body.classList.toggle('light-mode');
                    localStorage.setItem('eabvfx_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
                    tapCount = 0;
                }
                resetInactivityTimer();
            });
        }
        const savedTheme = localStorage.getItem('eabvfx_theme');
        if (savedTheme === 'light') document.body.classList.add('light-mode');
    </script>
</body>
</html>

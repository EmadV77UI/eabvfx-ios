name: Build iOS IPA
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Create App Structure
      run: |
        mkdir -p EABVFXBoost
        cp index.html EABVFXBoost/
        cp ContentView.swift EABVFXBoost/
        cp App.swift EABVFXBoost/
        cat > EABVFXBoost/Info.plist << 'PLIST'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0"><dict>
        <key>CFBundleName</key><string>EABVFX Boost</string>
        <key>CFBundleIdentifier</key><string>com.eabvfx.boost</string>
        <key>CFBundleVersion</key><string>1</string>
        <key>CFBundleShortVersionString</key><string>1.0</string>
        <key>NSAppTransportSecurity</key>
        <dict><key>NSAllowsArbitraryLoads</key><true/></dict>
        </dict></plist>
        PLIST
    - name: Build IPA
      run: |
        mkdir Payload
        mkdir EABVFXBoost.app
        cp EABVFXBoost/index.html EABVFXBoost.app/
        cp EABVFXBoost/Info.plist EABVFXBoost.app/
        cp -r EABVFXBoost.app Payload/
        zip -r EABVFXBoost.ipa Payload
        ls -la *.ipa
    - uses: actions/upload-artifact@v4
      with:
        name: EABVFXBoost.ipa
        path: "*.ipa"
